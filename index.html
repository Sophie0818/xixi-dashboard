<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嘻嘻媽媽・花園作息</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#faf6f0; --milk:#f4ede0; --latte:#e8d9c4; --tea:#c9ad90;
  --brown:#8b6e52; --dark:#4a3728; --soft:#f9f3eb; --white:#fffdf9;
  --green:#7aad6a; --bloom:#e8a0b4; --bloom2:#d4789a;
  --gold:#d4a830; --water:#7ab8d4; --xp:#9b7fd4;
  --am:#f5edde; --am-tx:#7a5c30; --am-bd:#e8d8c0;
  --pm:#ede8f5; --pm-tx:#5c4d7a; --pm-bd:#ddd8f0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;}
.ribbon{height:4px;background:linear-gradient(90deg,var(--latte),var(--tea),var(--bloom),var(--tea),var(--latte));}
.page{max-width:740px;margin:0 auto;padding:1.5rem 1.25rem 4rem;}

/* header */
.header{text-align:center;margin-bottom:1.5rem;}
.clock-block{display:inline-flex;flex-direction:column;align-items:center;background:var(--white);border:1px solid var(--latte);border-radius:16px;padding:10px 24px 8px;margin-bottom:1.2rem;gap:2px;}
.clock-time{font-family:'Zen Old Mincho',serif;font-size:1.9rem;font-weight:400;color:var(--brown);letter-spacing:0.08em;line-height:1;}
.clock-date{font-family:'Zen Old Mincho',serif;font-size:11px;color:var(--tea);letter-spacing:0.12em;}
.clock-tz{font-size:9px;color:var(--latte);letter-spacing:0.14em;text-transform:uppercase;margin-top:1px;}
.header h1{font-family:'Zen Old Mincho',serif;font-size:2rem;font-weight:400;letter-spacing:0.18em;color:var(--dark);}
.header h1 span{display:block;font-size:0.95rem;color:var(--brown);letter-spacing:0.22em;margin-top:4px;}
.hline{display:flex;align-items:center;gap:10px;margin:0.9rem auto 0;max-width:200px;}
.hline::before,.hline::after{content:'';flex:1;height:.5px;background:var(--latte);}
.hline span{font-size:12px;color:var(--tea);}

/* stats */
.stats-bar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.5rem;}
.stat{background:var(--white);border:1px solid var(--latte);border-radius:14px;padding:12px 8px;text-align:center;}
.stat-icon{font-size:18px;margin-bottom:4px;}
.stat-val{font-family:'Zen Old Mincho',serif;font-size:1.5rem;color:var(--brown);line-height:1;}
.stat-lbl{font-size:9.5px;color:var(--tea);margin-top:4px;letter-spacing:0.05em;}

/* garden */
.garden-wrap{background:var(--white);border:1px solid var(--latte);border-radius:20px;padding:1.25rem;margin-bottom:1.5rem;text-align:center;}
.garden-title{font-family:'Zen Old Mincho',serif;font-size:0.9rem;color:var(--brown);letter-spacing:0.14em;margin-bottom:0.75rem;}
.garden{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;min-height:80px;align-items:flex-end;padding:0.5rem 0;}
.flower{font-size:26px;transition:all 0.4s cubic-bezier(.34,1.56,.64,1);filter:grayscale(1) opacity(0.3);cursor:default;position:relative;}
.flower.bloomed{filter:grayscale(0) opacity(1);animation:pop 0.5s cubic-bezier(.34,1.56,.64,1);}
.flower.bloomed::after{content:attr(data-label);position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:7.5px;color:var(--tea);white-space:nowrap;}
@keyframes pop{0%{transform:scale(0.5) rotate(-10deg);}60%{transform:scale(1.25) rotate(5deg);}100%{transform:scale(1) rotate(0);}}

.progress-section{display:flex;align-items:center;gap:20px;margin-top:1rem;justify-content:center;}
.ring-wrap{position:relative;width:70px;height:70px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--latte);stroke-width:6;}
.ring-fill{fill:none;stroke:var(--bloom);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.6s ease;}
.ring-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.ring-pct{font-family:'Zen Old Mincho',serif;font-size:1.05rem;color:var(--brown);}
.ring-sub{font-size:8px;color:var(--tea);}
.progress-info{text-align:left;}
.progress-info p{font-size:11.5px;color:var(--dark);margin-bottom:4px;}
.progress-info span{font-size:10.5px;color:var(--tea);}
.xp-section{margin-top:0.9rem;background:var(--soft);border-radius:12px;padding:10px 14px;}
.xp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.xp-label{font-size:11px;color:var(--brown);letter-spacing:0.04em;}
.xp-val{font-family:'Zen Old Mincho',serif;font-size:12px;color:var(--xp);}
.xp-bar-wrap{background:var(--latte);border-radius:6px;height:7px;overflow:hidden;}
.xp-bar{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--xp),var(--bloom));transition:width 0.6s ease;}
.level-badge{display:inline-flex;align-items:center;gap:5px;background:var(--white);border:1px solid var(--latte);border-radius:20px;padding:3px 12px;margin-top:7px;font-size:11px;color:var(--brown);}
.streak-row{display:flex;gap:6px;justify-content:center;margin-top:0.6rem;}
.streak-day{width:28px;height:28px;border-radius:8px;border:1px solid var(--latte);background:var(--milk);display:flex;align-items:center;justify-content:center;font-size:9.5px;color:var(--tea);}
.streak-day.done{background:var(--bloom);border-color:var(--bloom2);color:white;}
.streak-day.today{border:2px solid var(--brown);}

/* water */
.water-section{background:var(--white);border:1px solid var(--latte);border-radius:16px;padding:1rem 1.25rem;margin-bottom:1.25rem;}
.section-title{font-family:'Zen Old Mincho',serif;font-size:0.95rem;color:var(--brown);letter-spacing:0.12em;display:flex;align-items:center;gap:10px;margin-bottom:0.75rem;}
.section-title::after{content:'';flex:1;height:.5px;background:var(--latte);}
.water-cups{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.cup{font-size:22px;cursor:pointer;transition:all 0.2s;filter:grayscale(1) opacity(0.3);}
.cup.filled{filter:grayscale(0) opacity(1);animation:cupPop 0.3s ease;}
@keyframes cupPop{0%{transform:scale(0.7);}60%{transform:scale(1.2);}100%{transform:scale(1);}}
.water-info{font-size:11px;color:var(--tea);margin-top:6px;font-style:italic;}

/* main category tabs */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.cat-tab{padding:5px 14px;border-radius:20px;border:1px solid var(--latte);background:transparent;color:var(--brown);font-size:11.5px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all 0.15s;}
.cat-tab:hover{background:var(--milk);}
.cat-tab.on{background:var(--brown);color:var(--white);border-color:var(--brown);}

/* skincare sub-tabs */
.sk-subtabs{display:flex;gap:0;margin-bottom:1rem;background:var(--milk);border-radius:12px;padding:4px;border:1px solid var(--latte);width:fit-content;}
.sk-subtab{padding:5px 20px;border-radius:9px;border:none;background:transparent;font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all 0.15s;color:var(--brown);letter-spacing:0.04em;}
.sk-subtab.on{background:var(--white);color:var(--dark);font-weight:500;box-shadow:0 1px 4px rgba(139,110,82,0.10);}
.sk-subtab.am-tab.on{background:var(--am);color:var(--am-tx);}
.sk-subtab.pm-tab.on{background:var(--pm);color:var(--pm-tx);}

/* skincare info card */
.sk-info-card{border-radius:14px;padding:12px 16px;margin-bottom:10px;border:1px solid;}
.sk-info-card.am{background:var(--am);border-color:var(--am-bd);}
.sk-info-card.pm{background:var(--pm);border-color:var(--pm-bd);}
.sk-info-time{font-family:'Zen Old Mincho',serif;font-size:0.85rem;color:var(--brown);letter-spacing:0.1em;margin-bottom:2px;}
.sk-info-note{font-size:10.5px;color:var(--tea);font-style:italic;}

/* task panels */
.task-panel{display:none;}
.task-panel.on{display:block;}
.sk-subpanel{display:none;}
.sk-subpanel.on{display:block;}

/* task items */
.task-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;border:1px solid var(--latte);background:var(--white);margin-bottom:6px;cursor:pointer;transition:all 0.18s;user-select:none;}
.task-item:hover{background:var(--soft);border-color:var(--tea);}
.task-item.done{background:var(--milk);border-color:var(--latte);}
.task-item.done .task-name{color:var(--tea);text-decoration:line-through;}
.task-item.am-task{border-left:3px solid var(--am-bd);}
.task-item.pm-task{border-left:3px solid var(--pm-bd);}
.task-item.am-task.done{border-left-color:var(--latte);}
.task-item.pm-task.done{border-left-color:var(--latte);}
.task-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--latte);background:var(--white);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;transition:all 0.2s;}
.task-item.done .task-check{background:var(--green);border-color:var(--green);}
.task-name{flex:1;font-size:12.5px;color:var(--dark);line-height:1.4;}
.task-xp{font-size:10px;color:var(--xp);font-family:'Zen Old Mincho',serif;white-space:nowrap;}

/* toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--white);border:1px solid var(--latte);border-radius:16px;padding:12px 24px;font-family:'Zen Old Mincho',serif;font-size:14px;color:var(--brown);letter-spacing:0.1em;box-shadow:0 4px 20px rgba(139,110,82,0.15);transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);z-index:999;text-align:center;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast-sub{font-family:'Noto Sans TC',sans-serif;font-size:10px;color:var(--tea);margin-top:2px;}

/* footer */
.footer{text-align:center;margin-top:2.5rem;padding-top:1.25rem;border-top:1px solid var(--latte);}
.footer p{font-family:'Zen Old Mincho',serif;font-size:11.5px;color:var(--tea);letter-spacing:0.14em;}
.reset-row{text-align:center;margin-top:1rem;}
.rbtn{font-size:10.5px;color:var(--tea);background:none;border:1px solid var(--latte);border-radius:20px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;padding:5px 18px;letter-spacing:0.06em;transition:all 0.15s;margin:0 4px;}
.rbtn:hover{background:var(--milk);color:var(--brown);}

@media(max-width:500px){
  .stats-bar{grid-template-columns:repeat(2,minmax(0,1fr));}
  .header h1{font-size:1.6rem;}
  .clock-time{font-size:1.5rem;}
  .cat-tab{font-size:10.5px;padding:5px 10px;}
}
</style>
</head>
<body>
<div class="ribbon"></div>
<div class="page">

  <div class="header">
    <div class="clock-block">
      <div class="clock-time" id="clock-time">--：--：--</div>
      <div class="clock-date" id="clock-date">載入中</div>
      <div class="clock-tz">Taipei Time · UTC+8</div>
    </div>
    <h1>嘻嘻媽媽花園<span>每　日　作　息</span></h1>
    <div class="hline"><span>✿</span></div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-icon">⭐</div><div class="stat-val" id="stat-daily">0</div><div class="stat-lbl">今日積分</div></div>
    <div class="stat"><div class="stat-icon">🌸</div><div class="stat-val" id="stat-flowers">0</div><div class="stat-lbl">花朵盛開</div></div>
    <div class="stat"><div class="stat-icon">💎</div><div class="stat-val" id="stat-total">0</div><div class="stat-lbl">累積XP</div></div>
    <div class="stat"><div class="stat-icon">🔥</div><div class="stat-val" id="stat-streak">0</div><div class="stat-lbl">連續天數</div></div>
  </div>

  <div class="garden-wrap">
    <div class="garden-title">✦ 嘻嘻媽媽的花園 ✦</div>
    <div class="garden" id="garden"></div>
    <div class="progress-section">
      <div class="ring-wrap">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle class="ring-bg" cx="35" cy="35" r="28"/>
          <circle class="ring-fill" id="ring-fill" cx="35" cy="35" r="28" stroke-dasharray="175.9" stroke-dashoffset="175.9"/>
        </svg>
        <div class="ring-text">
          <div class="ring-pct" id="ring-pct">0%</div>
          <div class="ring-sub">今日</div>
        </div>
      </div>
      <div class="progress-info">
        <p id="progress-msg">今天還沒開始，加油！🌱</p>
        <span id="progress-sub">完成任務讓花朵盛開 🌸</span>
      </div>
    </div>
    <div class="xp-section">
      <div class="xp-top">
        <div class="xp-label" id="level-name">🌱 嘻嘻媽媽等級</div>
        <div class="xp-val" id="xp-to-next">0 / 100 XP</div>
      </div>
      <div class="xp-bar-wrap"><div class="xp-bar" id="xp-bar" style="width:0%"></div></div>
      <div class="level-badge" id="level-badge">🌱 新手媽媽</div>
    </div>
    <div class="streak-row" id="streak-row"></div>
  </div>

  <div class="water-section">
    <div class="section-title">💧 今日水分</div>
    <div class="water-cups" id="water-cups"></div>
    <div class="water-info" id="water-info">0 / 2500ml　每次擠奶前先喝一杯 ✦</div>
  </div>

  <!-- main category tabs -->
  <div class="cat-tabs">
    <button class="cat-tab on"  onclick="showCat('morning')">🌅 早上</button>
    <button class="cat-tab" onclick="showCat('afternoon')">☀️ 下午</button>
    <button class="cat-tab" onclick="showCat('evening')">🌙 晚上</button>
    <button class="cat-tab" onclick="showCat('skincare')">✨ 護膚</button>
    <button class="cat-tab" onclick="showCat('recovery')">🧘 修復</button>
  </div>

  <div id="tasks-morning"   class="task-panel on"></div>
  <div id="tasks-afternoon" class="task-panel"></div>
  <div id="tasks-evening"   class="task-panel"></div>
  <div id="tasks-recovery"  class="task-panel"></div>

  <!-- skincare panel with sub-tabs -->
  <div id="tasks-skincare" class="task-panel">
    <div class="sk-subtabs">
      <button class="sk-subtab am-tab on" onclick="showSkincare('am')">🌤 早晨護膚</button>
      <button class="sk-subtab pm-tab"    onclick="showSkincare('pm')">🌙 晚間護膚</button>
    </div>
    <div id="sk-am" class="sk-subpanel on">
      <div class="sk-info-card am">
        <div class="sk-info-time">8:50am · 5分鐘</div>
        <div class="sk-info-note">餵完奶後・維他命C早上效果最好・別忘防曬</div>
      </div>
      <div id="tasks-skincare-am"></div>
    </div>
    <div id="sk-pm" class="sk-subpanel">
      <div class="sk-info-card pm">
        <div class="sk-info-time">6:50pm · 5–8分鐘</div>
        <div class="sk-info-note">沐浴後立即護膚・皮膚濕潤時吸收最好</div>
      </div>
      <div id="tasks-skincare-pm"></div>
    </div>
  </div>

  <div class="reset-row">
    <button class="rbtn" onclick="resetDay()">✦ 重置今日</button>
    <button class="rbtn" onclick="resetAll()">全部重置</button>
  </div>

  <div class="footer">
    <p>嘻嘻媽媽加油 &nbsp;·&nbsp; 你做得比你以為的多很多 &nbsp;✦</p>
  </div>
</div>

<div class="toast" id="toast">
  <div id="toast-msg">✿ 任務完成！</div>
  <div class="toast-sub" id="toast-sub">+10 XP</div>
</div>

<script>
/* ── TASKS ── */
const TASKS = {
  morning:[
    {id:'m1',name:'4am 接嘻嘻換班',             time:'4:00am',              xp:5,  flower:'🌷'},
    {id:'m2',name:'4am 餵奶＋換尿布',            time:'4:00am · 50分鐘',     xp:15, flower:'🌸'},
    {id:'m3',name:'8am 餵奶＋換尿布',            time:'8:00am · 50分鐘',     xp:15, flower:'🌹'},
    {id:'m4',name:'8:55am 擠奶①',               time:'40分鐘 · 先喝水',      xp:20, flower:'🌺'},
    {id:'m5',name:'吃早餐',                      time:'邊擠邊吃',             xp:10, flower:'🌼'},
  ],
  afternoon:[
    {id:'a1',name:'吃午餐',                      time:'12:00pm',             xp:10, flower:'🌻'},
    {id:'a2',name:'12pm 餵奶＋換尿布',           time:'50分鐘',              xp:15, flower:'💐'},
    {id:'a3',name:'12:50pm 擠奶②',              time:'40分鐘 · 先喝水',      xp:20, flower:'🌷'},
    {id:'a4',name:'1:30pm 午睡跟嘻嘻一起',       time:'最多1.5小時',          xp:15, flower:'🌸'},
    {id:'a5',name:'4pm 餵奶＋換尿布',            time:'50分鐘',              xp:15, flower:'🌹'},
    {id:'a6',name:'4:50pm 擠奶③',               time:'40分鐘 · 先喝水',      xp:20, flower:'🌺'},
  ],
  evening:[
    {id:'e1',name:'6:30pm 沐浴',                 time:'15–20分鐘',           xp:10, flower:'🌼'},
    {id:'e2',name:'吃晚餐',                      time:'7:00pm · 好好坐著',   xp:10, flower:'🌻'},
    {id:'e3',name:'7:30pm 產後修復',             time:'30分鐘',              xp:20, flower:'💐'},
    {id:'e4',name:'8:00pm 博主準備',             time:'20分鐘',              xp:15, flower:'🌷'},
    {id:'e5',name:'8:20pm 擠奶④',               time:'40分鐘 · 先喝水',      xp:20, flower:'🌸'},
    {id:'e6',name:'9:00pm 三行日記，關機',        time:'睡前',                xp:10, flower:'🌹'},
    {id:'e7',name:'9:10pm 上床睡覺',             time:'越早越好',            xp:10, flower:'🌺'},
  ],
  skincare_am:[
    {id:'sa1',name:'清潔',   time:'m̄enom̄eno Fc 溫和潔面露',  xp:5,  flower:'☀️', extra:'am-task'},
    {id:'sa2',name:'前導',   time:'m̄enom̄eno Tn 效能前導精露', xp:5,  flower:'✨', extra:'am-task'},
    {id:'sa3',name:'淡斑',   time:'維他命C 精華',              xp:5,  flower:'💛', extra:'am-task'},
    {id:'sa4',name:'防曬',   time:'SPF 30+ 每天必做',          xp:10, flower:'🌞', extra:'am-task'},
  ],
  skincare_pm:[
    {id:'sp1',name:'清潔',   time:'m̄enom̄eno Fc 溫和潔面露',  xp:5,  flower:'🌙', extra:'pm-task'},
    {id:'sp2',name:'修復',   time:'m̄enom̄eno Sr 專業集水精華', xp:5,  flower:'💜', extra:'pm-task'},
    {id:'sp3',name:'提亮',   time:'m̄enom̄eno Es 強化淨白精華', xp:5,  flower:'⭐', extra:'pm-task'},
    {id:'sp4',name:'鎖水',   time:'晚霜／乳液',               xp:5,  flower:'🍃', extra:'pm-task'},
  ],
  recovery:[
    {id:'r1',name:'骨盆底呼吸',  time:'360度呼吸 · 10分鐘',    xp:15, flower:'🌿'},
    {id:'r2',name:'Kegel 運動',  time:'收5秒放5秒 × 20組',     xp:15, flower:'🌱'},
    {id:'r3',name:'骨盆傾斜',    time:'10分鐘',                xp:10, flower:'🍀'},
  ],
};

const LEVELS=[
  {name:'🌱 新手媽媽', min:0,   max:100},
  {name:'🌷 努力媽媽', min:100, max:250},
  {name:'🌸 堅強媽媽', min:250, max:500},
  {name:'🌺 美麗媽媽', min:500, max:800},
  {name:'🌻 超級媽媽', min:800, max:1200},
  {name:'💐 傳奇媽媽', min:1200,max:99999},
];

const WATER_CUPS=10, WATER_ML=250;

/* ── STATE ── */
function today(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'})).toDateString();}

function loadState(){
  try{
    const raw=localStorage.getItem('xixiGame2');
    const s=raw?JSON.parse(raw):{};
    const todayStr=today();
    if(s.date!==todayStr){
      const yesterday=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
      yesterday.setDate(yesterday.getDate()-1);
      if(s.lastDoneDate===yesterday.toDateString()) s.streak=(s.streak||0)+1;
      else if(s.lastDoneDate!==todayStr) s.streak=0;
      s.date=todayStr; s.done=[]; s.water=0; s.dailyXp=0;
    }
    s.totalXp=s.totalXp||0; s.streak=s.streak||0;
    s.done=s.done||[]; s.water=s.water||0; s.dailyXp=s.dailyXp||0;
    return s;
  }catch(e){return {date:today(),done:[],water:0,totalXp:0,dailyXp:0,streak:0};}
}
function saveState(s){try{localStorage.setItem('xixiGame2',JSON.stringify(s));}catch(e){}}
let STATE=loadState();

/* ── SOUND ── */
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playChime(){
  try{
    const ctx=getCtx();
    [523.25,659.25,783.99,1046.5].forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=freq;
      const t=ctx.currentTime+i*0.12;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.18,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.4);o.start(t);o.stop(t+0.4);
    });
  }catch(e){}
}
function playWater(){
  try{
    const ctx=getCtx(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=880;
    o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.2);
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
    o.start();o.stop(ctx.currentTime+0.25);
  }catch(e){}
}
function playLevelUp(){
  try{
    const ctx=getCtx();
    [261.6,329.6,392,523.2,659.3].forEach((freq,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type='triangle';o.frequency.value=freq;
      const t=ctx.currentTime+i*0.1;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.2,t+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.5);o.start(t);o.stop(t+0.5);
    });
  }catch(e){}
}

/* ── TOAST ── */
let toastTimer=null;
function showToast(msg,sub){
  const el=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('toast-sub').textContent=sub||'';
  el.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2400);
}

/* ── ALL TASKS flat ── */
function allTasks(){
  return [...TASKS.morning,...TASKS.afternoon,...TASKS.evening,
          ...TASKS.skincare_am,...TASKS.skincare_pm,...TASKS.recovery];
}

/* ── RENDER ── */
function taskHTML(t){
  const done=STATE.done.includes(t.id);
  const extra=t.extra||'';
  return `<div class="task-item${done?' done':''} ${extra}" onclick="toggleTask('${t.id}')">
    <div class="task-check">${done?'✓':''}</div>
    <div class="task-name">${t.name}<br>
      <span style="font-size:10px;color:var(--tea);font-style:italic">${t.time}</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
      <div class="task-xp">+${t.xp} XP</div>
      <div style="font-size:16px">${t.flower}</div>
    </div>
  </div>`;
}

function renderTasks(){
  document.getElementById('tasks-morning').innerHTML   = TASKS.morning.map(taskHTML).join('');
  document.getElementById('tasks-afternoon').innerHTML = TASKS.afternoon.map(taskHTML).join('');
  document.getElementById('tasks-evening').innerHTML   = TASKS.evening.map(taskHTML).join('');
  document.getElementById('tasks-skincare-am').innerHTML = TASKS.skincare_am.map(taskHTML).join('');
  document.getElementById('tasks-skincare-pm').innerHTML = TASKS.skincare_pm.map(taskHTML).join('');
  document.getElementById('tasks-recovery').innerHTML  = TASKS.recovery.map(taskHTML).join('');
}

function renderGarden(){
  const all=allTasks();
  document.getElementById('garden').innerHTML=all.slice(0,20).map(t=>
    `<div class="flower${STATE.done.includes(t.id)?' bloomed':''}" data-label="${t.name.substring(0,4)}">${t.flower}</div>`
  ).join('');
}

function renderProgress(){
  const all=allTasks(),doneCount=STATE.done.length,total=all.length;
  const pct=total?Math.round(doneCount/total*100):0;
  const circ=175.9;
  document.getElementById('ring-fill').style.strokeDashoffset=circ-(circ*pct/100);
  document.getElementById('ring-pct').textContent=pct+'%';
  const msgs=[[0,'今天還沒開始，加油！🌱'],[20,'很好的開始！繼續 🌷'],[40,'進行中，你很棒！🌸'],[60,'超過一半了！🌺'],[80,'快到終點了！💐'],[100,'今日全部完成！太厲害了！🎊']];
  let msg=msgs[0][1];
  for(const[t,m] of msgs){if(pct>=t)msg=m;}
  document.getElementById('progress-msg').textContent=msg;
  document.getElementById('progress-sub').textContent=`已完成 ${doneCount} / ${total} 項任務`;
  document.getElementById('stat-daily').textContent=STATE.dailyXp;
  document.getElementById('stat-flowers').textContent=doneCount;
  document.getElementById('stat-total').textContent=STATE.totalXp;
  document.getElementById('stat-streak').textContent=STATE.streak;
}

function renderLevel(){
  const xp=STATE.totalXp;
  let lv=LEVELS[0];
  for(const l of LEVELS){if(xp>=l.min)lv=l;}
  const next=LEVELS[LEVELS.indexOf(lv)+1];
  const inLevel=xp-lv.min;
  const range=(next?next.min:lv.min+100)-lv.min;
  const pct=next?Math.min(100,Math.round(inLevel/range*100)):100;
  document.getElementById('level-name').textContent=lv.name;
  document.getElementById('xp-to-next').textContent=next?`${xp} / ${next.min} XP`:`${xp} XP 🏆`;
  document.getElementById('xp-bar').style.width=pct+'%';
  document.getElementById('level-badge').textContent=lv.name;
}

function renderWater(){
  const cups=document.getElementById('water-cups');
  cups.innerHTML='';
  for(let i=0;i<WATER_CUPS;i++){
    const d=document.createElement('div');
    d.className='cup'+(i<STATE.water?' filled':'');
    d.textContent='🥤';d.onclick=()=>toggleWater(i);
    cups.appendChild(d);
  }
  const ml=STATE.water*WATER_ML;
  document.getElementById('water-info').textContent=
    `${ml} / 2500ml　${ml>=2500?'🎉 今日達標！':'每次擠奶前先喝一杯 ✦'}`;
}

function renderStreak(){
  const el=document.getElementById('streak-row');
  const days=['一','二','三','四','五','六','日'];
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
  const todayWd=now.getDay();
  el.innerHTML=days.map((d,i)=>{
    const wd=(i+1)%7;
    const isToday=wd===todayWd||(i===6&&todayWd===0);
    const isPast=!isToday&&((wd-todayWd+7)%7>0);
    const done=!isPast&&(STATE.streak>0||STATE.done.length>0);
    return `<div class="streak-day${done?' done':''}${isToday?' today':''}">週${d}</div>`;
  }).join('');
}

function renderAll(){
  renderTasks();renderGarden();renderProgress();renderLevel();renderWater();renderStreak();
}

/* ── ACTIONS ── */
function toggleTask(id){
  const task=allTasks().find(t=>t.id===id);
  if(!task)return;
  const wasDone=STATE.done.includes(id);
  const oldLevel=LEVELS.filter(l=>STATE.totalXp>=l.min).pop();
  if(wasDone){
    STATE.done=STATE.done.filter(x=>x!==id);
    STATE.dailyXp=Math.max(0,STATE.dailyXp-task.xp);
    STATE.totalXp=Math.max(0,STATE.totalXp-task.xp);
  } else {
    STATE.done.push(id);
    STATE.dailyXp+=task.xp;
    STATE.totalXp+=task.xp;
    STATE.lastDoneDate=today();
    playChime();
    const newLevel=LEVELS.filter(l=>STATE.totalXp>=l.min).pop();
    if(newLevel&&newLevel.name!==oldLevel.name){
      setTimeout(()=>{playLevelUp();showToast('🎉 升級了！'+newLevel.name,'恭喜你達到新等級！');},400);
    } else {
      showToast(task.flower+' '+task.name,'+'+task.xp+' XP · 花朵盛開！');
    }
    if(STATE.done.length===allTasks().length){
      setTimeout(()=>{playLevelUp();showToast('🎊 今日全部完成！','嘻嘻媽媽好棒！');},700);
    }
  }
  saveState(STATE);renderAll();
}

function toggleWater(idx){
  STATE.water=idx<STATE.water?idx:idx+1;
  playWater();
  if(STATE.water*WATER_ML>=2500) showToast('💧 今日水分達標！','2500ml 完成 🎉');
  saveState(STATE);renderWater();
}

function showCat(name){
  document.querySelectorAll('.task-panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('tasks-'+name).classList.add('on');
  document.querySelectorAll('.cat-tab').forEach((b,i)=>
    b.classList.toggle('on',['morning','afternoon','evening','skincare','recovery'][i]===name));
}

function showSkincare(sub){
  document.getElementById('sk-am').classList.toggle('on',sub==='am');
  document.getElementById('sk-pm').classList.toggle('on',sub==='pm');
  document.querySelectorAll('.sk-subtab').forEach((b,i)=>
    b.classList.toggle('on',['am','pm'][i]===sub));
}

function resetDay(){
  if(!confirm('重置今日任務？（累積XP保留）'))return;
  STATE.done=[];STATE.water=0;STATE.dailyXp=0;
  saveState(STATE);renderAll();
}
function resetAll(){
  if(!confirm('確定清除所有數據？'))return;
  localStorage.removeItem('xixiGame2');STATE=loadState();renderAll();
}

/* ── CLOCK ── */
function updateClock(){
  const t=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
  const hh=String(t.getHours()).padStart(2,'0'),mm=String(t.getMinutes()).padStart(2,'0'),ss=String(t.getSeconds()).padStart(2,'0');
  document.getElementById('clock-time').textContent=`${hh}：${mm}：${ss}`;
  const days=['日','一','二','三','四','五','六'];
  const y=t.getFullYear(),mo=String(t.getMonth()+1).padStart(2,'0'),d=String(t.getDate()).padStart(2,'0');
  document.getElementById('clock-date').textContent=`${y} 年 ${mo} 月 ${d} 日　週${days[t.getDay()]}`;
}
updateClock();setInterval(updateClock,1000);

renderAll();
</script>
